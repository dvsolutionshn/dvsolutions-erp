{% if registros.paginator.num_pages > 1 %}<nav class="audit-pagination">{% if registros.has_previous %}<a class="erp-btn-secondary" href="?{{ request.GET.urlencode }}&page={{ registros.previous_page_number }}">Anterior</a>{% endif %}<span>Pagina {{ registros.number }} de {{ registros.paginator.num_pages }}</span>{% if registros.has_next %}<a class="erp-btn-secondary" href="?{{ request.GET.urlencode }}&page={{ registros.next_page_number }}">Siguiente</a>{% endif %}</nav>{% endif %}
