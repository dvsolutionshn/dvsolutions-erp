server {
    listen 80;
    server_name erp.tudominio.com *.erp.tudominio.com;

    client_max_body_size 25M;
    # Para rate limiting agrega en el bloque http principal de nginx:
    # limit_req_zone $binary_remote_addr zone=dvsolutions_general:10m rate=15r/s;
    # limit_req_zone $binary_remote_addr zone=dvsolutions_login:10m rate=5r/m;
    #
    # Y luego habilita dentro de este server o en locations sensibles:
    # limit_req zone=dvsolutions_general burst=40 nodelay;

    location /static/ {
        alias /opt/dvsolutions/repo/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /opt/dvsolutions/repo/media/;
    }

    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        proxy_pass http://unix:/run/dvsolutions.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180;
        proxy_connect_timeout 180;
        proxy_send_timeout 180;
    }
}
