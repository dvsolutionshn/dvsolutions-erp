{% extends "core/erp_base.html" %}
{% load static humanize %}

{% block extra_head %}
<style>
:root{--garage-bg:#071018;--garage-panel:#0d1b25;--garage-line:rgba(126,231,255,.16);--garage-cyan:#49e3ff;--garage-lime:#b9ff66;--garage-orange:#ff9d4d;--garage-text:#eafaff;--garage-muted:#88a6b5}
.garage-shell{position:relative;isolation:isolate;color:var(--garage-text);background:radial-gradient(circle at 10% 0%,rgba(73,227,255,.12),transparent 34%),radial-gradient(circle at 100% 20%,rgba(185,255,102,.08),transparent 28%),var(--garage-bg);border-radius:28px;padding:24px;overflow:hidden;min-height:650px}
.garage-shell:before{content:"";position:absolute;inset:0;z-index:-1;background-image:linear-gradient(rgba(73,227,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(73,227,255,.035) 1px,transparent 1px);background-size:36px 36px;mask-image:linear-gradient(to bottom,#000,transparent)}
.garage-head{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:22px}.garage-eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--garage-cyan);font-weight:800}.garage-title{margin:5px 0 0;font-size:clamp(28px,4vw,46px);letter-spacing:-.04em}.garage-sub{color:var(--garage-muted);margin:6px 0 0}.garage-live{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--garage-line);border-radius:999px;padding:9px 14px;background:rgba(255,255,255,.025);font-size:12px;font-weight:800;letter-spacing:.08em}.garage-live:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--garage-lime);box-shadow:0 0 16px var(--garage-lime)}
.garage-actions{display:flex;gap:10px;flex-wrap:wrap}.garage-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(73,227,255,.35);border-radius:12px;padding:11px 16px;color:#061119;background:linear-gradient(135deg,var(--garage-cyan),#9af2ff);font-weight:900;cursor:pointer}.garage-btn.secondary{color:var(--garage-text);background:rgba(255,255,255,.04);border-color:var(--garage-line)}
.garage-kpis{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:12px;margin-bottom:20px}.garage-kpi{border:1px solid var(--garage-line);border-radius:18px;padding:16px;background:linear-gradient(145deg,rgba(255,255,255,.055),rgba(255,255,255,.018));box-shadow:inset 0 1px rgba(255,255,255,.04)}.garage-kpi span{display:block;color:var(--garage-muted);font-size:10px;text-transform:uppercase;letter-spacing:.14em}.garage-kpi strong{display:block;font-size:30px;margin-top:8px}.garage-kpi small{color:var(--garage-cyan)}
.garage-panel{border:1px solid var(--garage-line);border-radius:20px;background:rgba(8,20,29,.82);backdrop-filter:blur(12px);padding:18px}.garage-panel-title{margin:0 0 4px;font-size:18px}.garage-panel-copy{margin:0 0 16px;color:var(--garage-muted);font-size:13px}.garage-grid{display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:12px;overflow-x:auto;padding-bottom:8px}.garage-lane{min-height:320px;border:1px solid var(--garage-line);border-radius:16px;background:rgba(255,255,255,.018);padding:12px}.garage-lane-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.garage-lane-head h3{font-size:12px;text-transform:uppercase;letter-spacing:.12em;margin:0}.garage-count{border-radius:999px;background:rgba(73,227,255,.12);color:var(--garage-cyan);padding:4px 8px;font-size:11px;font-weight:900}.garage-card{display:block;color:inherit;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px;margin-bottom:10px;background:linear-gradient(150deg,rgba(255,255,255,.07),rgba(255,255,255,.025));transition:.18s}.garage-card:hover{transform:translateY(-2px);border-color:rgba(73,227,255,.4)}.garage-card-top{display:flex;justify-content:space-between;gap:8px}.garage-plate{font-weight:950;letter-spacing:.1em;font-size:17px}.garage-order{color:var(--garage-cyan);font-size:10px}.garage-car{font-size:12px;color:#cce4ec;margin:7px 0}.garage-meta{display:flex;justify-content:space-between;color:var(--garage-muted);font-size:10px}.garage-progress{height:4px;border-radius:999px;background:rgba(255,255,255,.08);margin-top:10px;overflow:hidden}.garage-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--garage-cyan),var(--garage-lime));box-shadow:0 0 10px var(--garage-cyan)}
.garage-form{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:15px}.garage-field{display:flex;flex-direction:column;gap:7px}.garage-field.span-2{grid-column:span 2}.garage-field.span-all{grid-column:1/-1}.garage-field label{color:#b9d0d9;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em}.garage-field input,.garage-field select,.garage-field textarea,.garage-input{width:100%;box-sizing:border-box;border:1px solid var(--garage-line);border-radius:12px;padding:12px 13px;background:#0b1821;color:var(--garage-text);outline:none}.garage-field input:focus,.garage-field select:focus,.garage-field textarea:focus{border-color:var(--garage-cyan);box-shadow:0 0 0 3px rgba(73,227,255,.1)}.garage-field option{background:#0b1821}.garage-errors{color:#ff938f;font-size:12px}.garage-badge{display:inline-flex;border:1px solid var(--garage-line);border-radius:999px;padding:5px 9px;color:var(--garage-cyan);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.garage-badge.urgent{color:#ff9a86;border-color:rgba(255,100,80,.25)}
.garage-table{width:100%;border-collapse:collapse}.garage-table th{text-align:left;color:var(--garage-muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:12px;border-bottom:1px solid var(--garage-line)}.garage-table td{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}.garage-table a{color:var(--garage-cyan);font-weight:800}.garage-split{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(300px,.7fr);gap:16px}.garage-timeline{border-left:1px solid var(--garage-line);padding-left:18px}.garage-event{position:relative;margin-bottom:16px}.garage-event:before{content:"";position:absolute;left:-23px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--garage-cyan);box-shadow:0 0 10px rgba(73,227,255,.7)}.garage-event strong{font-size:12px}.garage-event p{margin:4px 0;color:var(--garage-muted);font-size:11px}.garage-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}.garage-gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;border:1px solid var(--garage-line)}
@media(max-width:1100px){.garage-kpis{grid-template-columns:repeat(2,1fr)}.garage-form{grid-template-columns:repeat(2,1fr)}.garage-split{grid-template-columns:1fr}}@media(max-width:680px){.garage-shell{padding:15px;border-radius:18px}.garage-head{align-items:flex-start;flex-direction:column}.garage-kpis,.garage-form{grid-template-columns:1fr}.garage-field.span-2{grid-column:auto}.garage-title{font-size:30px}}
</style>
{% endblock %}

{% block sidebar_description %}Garage OS · Control vehicular, diagnostico y produccion del taller en tiempo real.{% endblock %}
